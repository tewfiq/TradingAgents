[project]
# The name of your Chainlit app
name = "TradingAgents Advanced UXD GUI"

# Description of your app
description = "Multi-Agents LLM Financial Trading Framework - Advanced Web Interface"

# Public directory for static files
public = "public"

# Whether to enable telemetry (default: true)
# When enabled, anonymized usage data is collected to help improve Chainlit.
enable_telemetry = true

# List of environment variables to be provided by each user to use the app.
user_env = []

# Duration (in seconds) during which the session is saved when the connection is lost
session_timeout = 3600

# Enable third parties caching (e.g LangChain cache)
cache = false

# Authorized origins
allow_origins = ["*"]

# Follow symlink for asset mount (see https://github.com/Chainlit/chainlit/issues/317)
# follow_symlink = false

[features]
# Show the prompt playground
prompt_playground = true

# Process and display HTML in messages. This can be a security risk (see https://chainlit.io/security)
unsafe_allow_html = false

# Process and display mathematical expressions. This can clash with dollar signs in messages.
latex = false

# Automatically tag threads when an assistant message is created
auto_tag_thread = true

# Authorize users to spontaneously upload files with messages
spontaneous_file_upload = true

[UI]
# Name of the app and chatbot.
name = "TradingAgents"

# Show the readme while the conversation is empty.
show_readme_as_default = true

# Description of the chatbot. This will be used for the header of the app.
description = "Multi-Agents LLM Financial Trading Framework"

# Large size content are by default collapsed for a cleaner ui
default_collapse_content = true

# The default value for the expand messages settings.
default_expand_messages = false

# Hide the chain of thought details from the user in the UI.
hide_cot = false

# Link to your github repo. This will add a github button in the UI's header.
github = "https://github.com/TauricResearch"

# Specify a CSS file that can be used to customize the user interface.
# The CSS file should be placed in the "public" directory.
custom_css = "/public/terminal-theme.css"

# Override default MUI light theme. (Check theme.ts)
[UI.theme]
primary_color = "#00ff88"
background_color = "#0a0a0a"
paper_color = "#1a1a1a"

[UI.theme.light]
background = "#0a0a0a"
paper = "#1a1a1a"
primary = { main = "#00ff88" }
secondary = { main = "#ff6b6b" }
text = { primary = "#ffffff", secondary = "#b0b0b0" }

[UI.theme.dark]
background = "#0a0a0a"
paper = "#1a1a1a"
primary = { main = "#00ff88" }
secondary = { main = "#ff6b6b" }
text = { primary = "#ffffff", secondary = "#b0b0b0" }

[meta]
generated_by = "1.4.0"